name: Bug report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report an issue.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
      placeholder: When I run X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Clone repo
        2. Run `./gradlew :composeApp:run`
        3. ...
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: Android 14 / iOS 17 / Desktop JVM
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Commit or version
      placeholder: main @ abc1234
